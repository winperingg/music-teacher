<!DOCTYPE html>
<html>

<head>

<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container">

<div class="row justify-content-center">

<div class="col-md-4">

<div class="card mt-5 shadow">

<div class="card-body">

<h4 class="mb-4 text-center">

Login

</h4>

<form method="POST">

{% csrf_token %}

<div class="mb-3">

<input
type="text"
name="username"
class="form-control"
placeholder="Usuário"
>

</div>

<div class="mb-3">

<input
type="password"
name="password"
class="form-control"
placeholder="Senha"
>

</div>

<button class="btn btn-dark w-100">

Entrar

</button>

</form>

</div>

</div>

</div>

</div>

</div>

</body>

</html>
