<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Music Teacher</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #0d6efd, #111827);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-wrapper {
            width: 100%;
            max-width: 430px;
        }

        .login-card {
            border: 0;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.20);
            overflow: hidden;
        }

        .login-header {
            background: #111827;
            color: white;
            text-align: center;
            padding: 24px 20px;
        }

        .login-body {
            background: white;
            padding: 24px;
        }

        .form-control {
            height: 52px;
            font-size: 16px;
            border-radius: 12px;
        }

        .btn-login {
            height: 52px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
        }

        .btn-create {
            height: 48px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
        }

        .small-link {
            text-decoration: none;
        }

        @media (max-width: 576px) {
            body {
                padding: 16px;
                align-items: flex-start;
                padding-top: 60px;
            }

            .login-wrapper {
                max-width: 100%;
            }

            .login-header {
                padding: 22px 18px;
            }

            .login-body {
                padding: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="login-wrapper">
        <div class="card login-card">
            <div class="login-header">
                <h2 class="mb-1">🎸 Music Teacher</h2>
                <p class="mb-0">Entre com sua conta</p>
            </div>

            <div class="login-body">
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-danger">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}

                <form method="POST">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">Usuário</label>
                        <input type="text" name="username" class="form-control" placeholder="Digite seu usuário" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Senha</label>
                        <input type="password" name="password" class="form-control" placeholder="Digite sua senha" required>
                    </div>

                    <button type="submit" class="btn btn-dark w-100 btn-login mb-3">
                        Entrar
                    </button>
                </form>

                <div class="text-center mb-3">
                    <a href="/recuperar-senha/" class="small-link">
                        Esqueci minha senha
                    </a>
                </div>

                <hr>

                <div class="text-center">
                    <p class="mb-2">Ainda não tem conta?</p>
                    <a href="/criar-conta/" class="btn btn-success w-100 btn-create">
                        Criar conta
                    </a>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
