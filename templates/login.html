{% load static %}

<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background: linear-gradient(135deg,#111,#222);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
}

.card-login{
    width:100%;
    max-width:420px;
    border-radius:12px;
}

</style>

</head>

<body>

<div class="card shadow card-login">

<div class="card-body p-4">

<h3 class="text-center mb-4">
🎸 Music Teacher
</h3>

{% if messages %}

{% for message in messages %}

<div class="alert alert-danger">
{{ message }}
</div>

{% endfor %}

{% endif %}

<form method="POST">

{% csrf_token %}

<div class="mb-3">

<label class="form-label">Usuário</label>

<input
type="text"
name="username"
class="form-control"
required>

</div>

<div class="mb-3">

<label class="form-label">Senha</label>

<input
type="password"
name="password"
class="form-control"
required>

</div>

<button class="btn btn-dark w-100 mb-3">
Entrar
</button>

</form>

<div class="text-center mb-3">

<a href="/recuperar-senha/">
Esqueci minha senha
</a>

</div>

<hr>

<div class="text-center">

<p class="mb-2">Não tem conta?</p>

<a href="/criar-conta/" class="btn btn-success w-100">
Criar conta
</a>

</div>

</div>

</div>

</body>

</html>
