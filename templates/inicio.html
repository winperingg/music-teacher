<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Teacher</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f5f6fa;
        }
        .hero-card {
            border: 0;
            border-radius: 20px;
        }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="text-center mb-5">
        <h1 class="fw-bold">🎸 Music Teacher</h1>
        <p class="text-muted">Escolha como deseja entrar no sistema</p>
    </div>

    <div class="row justify-content-center g-4">
        <div class="col-md-4">
            <div class="card shadow hero-card h-100">
                <div class="card-body text-center p-4">
                    <h3 class="mb-3">👨‍🏫 Sou professor</h3>
                    <p class="text-muted">
                        Acesse dashboard, agenda, alunos e pagamentos.
                    </p>
                    <a href="/login/" class="btn btn-dark w-100">
                        Entrar como professor
                        <a href="/criar-conta/" class="btn btn-success w-100 mt-2">
    Criar conta
</a>
                    </a>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow hero-card h-100">
                <div class="card-body text-center p-4">
                    <h3 class="mb-3">🎓 Sou aluno</h3>
                    <p class="text-muted">
                        Veja suas aulas, conteúdos e informações do curso.
                    </p>
                    <a href="/login/" class="btn btn-primary w-100">
                        Entrar como aluno
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
