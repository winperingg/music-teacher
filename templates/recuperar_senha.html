{% extends "base.html" %}

{% block content %}

<h2>Recuperar senha</h2>

<form method="post">
    {% csrf_token %}

    <div class="mb-3">
        <label>E-mail</label>
        <input type="email" name="email" class="form-control" required>
    </div>

    <button class="btn btn-primary">
        Enviar link de recuperação
    </button>

</form>

{% endblock %}
